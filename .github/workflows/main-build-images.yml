name: Main Build Images

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: crm
            image: sironic-crm
          - app: partner-portal
            image: sironic-partner-portal
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repository owner (GHCR requirement)
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/${{ matrix.image }}:latest
            ghcr.io/${{ steps.owner.outputs.owner }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ github.workflow }}-${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-${{ matrix.app }}
